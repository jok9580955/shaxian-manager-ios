<h1>隐私政策</h1>
<p class="muted">最后更新：2026-05-02</p>
<p>沙县小吃店铺管家-经营日报-材料库存是一款面向小型餐饮店的离线优先经营工具。</p>
<h2>数据收集</h2>
<p>当前版本无需账号登录，也不会把个人数据收集到开发者运营的服务器。</p>
<h2>本地数据</h2>
<p>你创建的客户资料、库存记录和财务流水保存在本机设备中。</p>
<h2>第三方服务</h2>
<p>当前版本不包含第三方分析、广告 SDK 或跟踪功能。</p>
<h2>联系</h2>
<p>如有隐私问题，请通过支持页面联系开发者。</p>
